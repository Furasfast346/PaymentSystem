<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ item.name }} | Купить</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .product-card {
            max-width: 520px;
            margin: auto;
            border: none;
            border-radius: 24px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.12);
            background: white;
            overflow: hidden;
        }
        .price {
            font-size: 2.8rem;
            font-weight: 800;
            color: #2c3e50;
        }
        .btn-buy {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 14px 32px;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 50px;
            width: 100%;
            color: white;
            transition: all 0.3s ease;
        }
        .btn-buy:hover { transform: scale(1.03); box-shadow: 0 12px 25px rgba(102, 126, 234, 0.4); }
        .btn-buy:disabled { background: #95a5a6; transform: none; }
    </style>
</head>
<body>
    <div class="card product-card">
        <div class="card-body p-5">
            <h2 class="card-title mb-3">{{ item.name }}</h2>
            <p class="text-muted">{{ item.description|default:"Описание отсутствует" }}</p>

            <div class="text-center my-5">
                <span class="price">{{ item.price }} <span class="fs-4 fw-normal text-muted">руб.</span></span>
            </div>

            <button id="buy-button" class="btn btn-buy" data-id="{{ item.id }}">
                💳 Купить сейчас
            </button>

            <div id="error-message" class="alert alert-danger mt-4 d-none"></div>
        </div>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const stripe = Stripe('{{ stripe_public_key }}');
        const buyButton = document.getElementById('buy-button');
        const errorDiv = document.getElementById('error-message');
        const itemId = buyButton.dataset.id;

        buyButton.addEventListener('click', async () => {
            buyButton.disabled = true;
            buyButton.innerHTML = '⏳ Обрабатываем...';

            try {
                const response = await fetch(`/buy-item/${itemId}`, { method: 'GET' });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Ошибка сервера');
                }

                const { session_id } = await response.json();   // ← подстраивай под то, что возвращает твой view
                await stripe.redirectToCheckout({ sessionId: session_id });
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.classList.remove('d-none');
                buyButton.disabled = false;
                buyButton.textContent = '💳 Купить сейчас';
            }
        });
    </script>
</body>
</html>
