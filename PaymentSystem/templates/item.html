<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ item.name }} | Купить</title>
    <!-- Google Fonts + Bootstrap 5 (быстро и красиво) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .product-card {
            max-width: 500px;
            margin: auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            background: white;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .price {
            font-size: 2.5rem;
            font-weight: 800;
            color: #2c3e50;
            display: inline-block;
            background: #ecf0f1;
            padding: 5px 15px;
            border-radius: 50px;
        }
        .currency {
            font-size: 1.2rem;
            font-weight: 400;
            color: #7f8c8d;
        }
        .btn-buy {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s;
            width: 100%;
            color: white;
        }
        .btn-buy:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            filter: brightness(1.05);
        }
        .btn-buy:disabled {
            background: #95a5a6;
            transform: none;
            cursor: not-allowed;
        }
        .badge {
            background-color: #e67e22;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .card-body {
            padding: 2rem;
        }
        hr {
            background-color: #ddd;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="card product-card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="card-title mb-0">{{ item.name }}</h2>
                <span class="badge">🔥 Хит</span>
            </div>
            <p class="card-text text-muted">{{ item.description|default:"Описание отсутствует" }}</p>
            <hr>
            <div class="text-center my-4">
                <span class="price">{{ item.price }} <span class="currency">руб.</span></span>
            </div>
            <button id="buy-button" class="btn btn-buy" data-id="{{ item.id }}">
                💳 Купить сейчас
            </button>
            <div id="error-message" class="alert alert-danger mt-3" style="display: none;"></div>
        </div>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        // Инициализация Stripe (тестовый ключ, для продакшена вынести в .env)
        const stripe = Stripe('pk_test_51TOCcq85B5ewcsD1fuMWsequzophF9wCVPqrP7Mb0Kak0IWPmL5FII68McNrx5ahwrdXJTIULL9EjXYlWH1o3yFJ00fzBUHB36');
        const buyButton = document.getElementById('buy-button');
        const errorDiv = document.getElementById('error-message');
        const itemId = buyButton.getAttribute('data-id');

        buyButton.addEventListener('click', async function() {
            // Блокируем кнопку, пока идёт запрос
            buyButton.disabled = true;
            buyButton.textContent = '⏳ Обработка...';
            errorDiv.style.display = 'none';

            try {
                const response = await fetch(`/buy/${itemId}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Ошибка сервера');
                }

                const session = await response.json();
                // Редирект на Stripe Checkout
                const result = await stripe.redirectToCheckout({ sessionId: session.session_id });

                if (result.error) {
                    throw new Error(result.error.message);
                }
            } catch (error) {
                console.error('Error:', error);
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                buyButton.disabled = false;
                buyButton.textContent = '💳 Купить сейчас';
            }
        });
    </script>
</body>
</html>
